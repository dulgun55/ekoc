<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Quick Look</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: "Segoe UI", sans-serif;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: min(94vw, 420px);
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 10px;
    }

    p {
      margin: 0 0 14px;
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.4;
    }

    #quicklook-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #22c55e;
      color: #04130a;
      font-weight: 700;
      text-decoration: none;
    }

    #quicklook-thumb {
      width: 56px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid rgba(0, 0, 0, 0.25);
      object-fit: cover;
      background: #111827;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
