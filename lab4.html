<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 4 - Marker AR (iPhone Safari)</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: "Segoe UI", sans-serif;
      background: #0b1020;
      color: #f8fafc;
    }

    #status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.28);
      max-width: min(760px, 95vw);
    }

    #controls {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.28);
      font-size: 13px;
      max-width: min(96vw, 820px);
    }

    .ctrl-btn {
      border: 0;
      border-radius: 8px;
      padding: 7px 10px;
      background: #e2e8f0;
      color: #111827;
      font-weight: 700;
      cursor: pointer;
    }

    #scale-range {
      width: 140px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button class="ctrl-btn" id="move-left" type="button">Left</button>
    <button class="ctrl-btn" id="move-right" type="button">Right</button>
    <button class="ctrl-btn" id="move-forward" type="button">Forward</button>
    <button class="ctrl-btn" id="move-back" type="button">Back</button>
    <label for="scale-range">Size</label>
    <input id="scale-range" type="range" min="0.2" max="1.2" step="0.05" value="0.45" />
    <button class="ctrl-btn" id="reset" type="button">Reset</button>
  </div>

  <div id="status">Status: Camera ?????????? Hiro marker ??? ????????? ??.</div>

  <a-scene
    id="scene"
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; colorManagement: true"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  >
    <a-assets>
      <a-asset-item id="ekocModel" src="ekoc.glb"></a-asset-item>
    </a-assets>

    <a-marker id="marker" preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      <a-entity id="modelRoot" position="0 0 0" rotation="0 0 0">
        <a-gltf-model id="mainModel" src="#ekocModel" position="0 0 0" scale="0.45 0.45 0.45"></a-gltf-model>
        <a-circle id="modelShadow" position="0 0.01 0" rotation="-90 0 0" radius="0.28" material="color: #000000; opacity: 0.25; shader: flat"></a-circle>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
    <a-light type="ambient" intensity="0.95"></a-light>
    <a-light type="directional" intensity="0.7" position="0 1 1"></a-light>
  </a-scene>

  <script>
    const statusEl = document.querySelector("#status");
    const markerEl = document.querySelector("#marker");
    const modelRoot = document.querySelector("#modelRoot");
    const mainModel = document.querySelector("#mainModel");
    const modelShadow = document.querySelector("#modelShadow");
    const scaleRangeEl = document.querySelector("#scale-range");

    const step = 0.05;
    let modelScale = Number(scaleRangeEl.value);
    let yaw = 0;

    function setStatus(text) {
      statusEl.textContent = `Status: ${text}`;
    }

    function applyScale(value) {
      modelScale = value;
      mainModel.setAttribute("scale", `${value} ${value} ${value}`);
      modelShadow.setAttribute("radius", Math.max(0.18, value * 0.65));
    }

    function move(dx, dz) {
      const p = modelRoot.getAttribute("position");
      modelRoot.setAttribute("position", `${p.x + dx} ${p.y} ${p.z + dz}`);
      setStatus("Model marker ???? ????????.");
    }

    document.querySelector("#move-left").addEventListener("click", () => move(-step, 0));
    document.querySelector("#move-right").addEventListener("click", () => move(step, 0));
    document.querySelector("#move-forward").addEventListener("click", () => move(0, -step));
    document.querySelector("#move-back").addEventListener("click", () => move(0, step));

    document.querySelector("#reset").addEventListener("click", () => {
      modelRoot.setAttribute("position", "0 0 0");
      yaw = 0;
      modelRoot.setAttribute("rotation", "0 0 0");
      setStatus("Model ??????? reset ????????.");
    });

    scaleRangeEl.addEventListener("input", () => {
      applyScale(Number(scaleRangeEl.value));
    });

    markerEl.addEventListener("markerFound", () => {
      setStatus("Marker ?????????. ???? ?? ????? ???????? model-?? 3D ???? ?????.");
    });

    markerEl.addEventListener("markerLost", () => {
      setStatus("Marker ?????????. Hiro marker-?? ????? ??????? ???? ??????? ??.");
    });

    let dragging = false;
    let prevX = 0;

    window.addEventListener("pointerdown", (e) => {
      dragging = true;
      prevX = e.clientX;
    });

    window.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      const dx = e.clientX - prevX;
      prevX = e.clientX;
      yaw += dx * 0.2;
      modelRoot.setAttribute("rotation", `0 ${yaw} 0`);
    });

    window.addEventListener("pointerup", () => {
      dragging = false;
    });

    mainModel.addEventListener("model-loaded", () => {
      applyScale(modelScale);
      setStatus("Model ????????. ????? ?????????? Hiro marker ??? ????????? ??.");
    });
  </script>
</body>
</html>
